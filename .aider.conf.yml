################################################################
# Aider Configuration File for Maximum Token Optimization
# Put this in your repository root or your user home directory.
################################################################

# Auto-commit behavior (disabled to prevent spamming git logs)
auto-commits: false

# Model and token settings
map-tokens: 1024 # Limit the size of the repository map to save tokens
map-multiplier: 2 # Detail level of the repo map

# Ignore files to keep the context clean (in addition to .gitignore)
ignore:
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/.next/**"
  - "**/*.log"
  - "**/*.sqlite"
  - "package-lock.json"
  - "yarn.lock"
  - "pnpm-lock.yaml"
  - ".env*"

# Editor and terminal preferences
code-theme: "monokai"
show-diffs: true # Always show what is changed so you can audit the AI's work
show-prompts: false # Hide verbose prompts to keep console clean
stream: true # Stream output for real-time verification
